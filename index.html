<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarVal — Price Predictor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <div class="bg-grid"></div>
    <div class="bg-glow"></div>

    <div class="page-wrapper">

        <header class="header">
            <div class="logo">
                <span class="logo-icon">◈</span>
                <span class="logo-text">CarVal</span>
            </div>
            <p class="tagline">AI-Powered Resale Estimator</p>
        </header>

        <main class="main">
            <div class="hero">
                <h1 class="hero-title">What's your<br><em>car worth?</em></h1>
                <p class="hero-sub">Enter your car's details below and get an instant AI price estimate in seconds.</p>
            </div>

            <div class="card">
                <form action="/predict" method="post" id="predictForm">

                    <div class="form-section">
                        <span class="section-label">01 — Vehicle</span>
                        <div class="field-group two-col">
                            <div class="field">
                                <label>Car Model</label>
                                <select name="car_name" required>
                                    <option value="" disabled selected>Select model</option>
                                    <optgroup label="Maruti Suzuki">
                                        <option value="alto 800">Alto 800</option>
                                        <option value="alto k10">Alto K10</option>
                                        <option value="baleno">Baleno</option>
                                        <option value="ciaz">Ciaz</option>
                                        <option value="dzire">Dzire</option>
                                        <option value="ertiga">Ertiga</option>
                                        <option value="ignis">Ignis</option>
                                        <option value="omni">Omni</option>
                                        <option value="ritz">Ritz</option>
                                        <option value="s cross">S-Cross</option>
                                        <option value="swift">Swift</option>
                                        <option value="sx4">SX4</option>
                                        <option value="vitara brezza">Vitara Brezza</option>
                                        <option value="wagon r">Wagon R</option>
                                    </optgroup>
                                    <optgroup label="Honda">
                                        <option value="amaze">Amaze</option>
                                        <option value="brio">Brio</option>
                                        <option value="city">City</option>
                                        <option value="jazz">Jazz</option>
                                    </optgroup>
                                    <optgroup label="Hyundai">
                                        <option value="creta">Creta</option>
                                        <option value="elantra">Elantra</option>
                                        <option value="eon">Eon</option>
                                        <option value="grand i10">Grand i10</option>
                                        <option value="i10">i10</option>
                                        <option value="i20">i20</option>
                                        <option value="verna">Verna</option>
                                        <option value="xcent">Xcent</option>
                                    </optgroup>
                                    <optgroup label="Toyota">
                                        <option value="camry">Camry</option>
                                        <option value="corolla">Corolla</option>
                                        <option value="corolla altis">Corolla Altis</option>
                                        <option value="etios cross">Etios Cross</option>
                                        <option value="etios g">Etios G</option>
                                        <option value="etios gd">Etios GD</option>
                                        <option value="etios liva">Etios Liva</option>
                                        <option value="fortuner">Fortuner</option>
                                        <option value="innova">Innova</option>
                                        <option value="land cruiser">Land Cruiser</option>
                                    </optgroup>
                                </select>
                            </div>
                            <div class="field">
                                <label>Year of Purchase</label>
                                <input type="number" name="year" placeholder="e.g. 2018" min="2000" max="2024" required>
                            </div>
                        </div>
                    </div>

                    <div class="divider"></div>

                    <div class="form-section">
                        <span class="section-label">02 — Pricing & Usage</span>
                        <div class="field-group two-col">
                            <div class="field">
                                <label>Showroom Price <span class="unit">(₹ Lakhs)</span></label>
                                <input type="number" name="present_price" placeholder="e.g. 8.50" step="0.01" min="0" required>
                            </div>
                            <div class="field">
                                <label>Kilometers Driven</label>
                                <input type="number" name="driven_kms" placeholder="e.g. 45000" min="0" required>
                            </div>
                        </div>
                    </div>

                    <div class="divider"></div>

                    <div class="form-section">
                        <span class="section-label">03 — Specifications</span>
                        <div class="field-group three-col">
                            <div class="field">
                                <label>Fuel Type</label>
                                <select name="fuel_type" required>
                                    <option value="" disabled selected>Select</option>
                                    <option value="Petrol">⛽ Petrol</option>
                                    <option value="Diesel">🛢 Diesel</option>
                                    <option value="CNG">♻ CNG</option>
                                </select>
                            </div>
                            <div class="field">
                                <label>Transmission</label>
                                <select name="transmission" required>
                                    <option value="" disabled selected>Select</option>
                                    <option value="Manual">Manual</option>
                                    <option value="Automatic">Automatic</option>
                                </select>
                            </div>
                            <div class="field">
                                <label>Seller Type</label>
                                <select name="selling_type" required>
                                    <option value="" disabled selected>Select</option>
                                    <option value="Dealer">Dealer</option>
                                    <option value="Individual">Individual</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="divider"></div>

                    <div class="form-section">
                        <span class="section-label">04 — Ownership</span>
                        <div class="owner-pills">
                            <label class="pill-label">Previous Owners</label>
                            <div class="pills">
                                <label class="pill">
                                    <input type="radio" name="owner" value="0" required>
                                    <span>0 — First Owner</span>
                                </label>
                                <label class="pill">
                                    <input type="radio" name="owner" value="1">
                                    <span>1 Owner</span>
                                </label>
                                <label class="pill">
                                    <input type="radio" name="owner" value="3">
                                    <span>3+ Owners</span>
                                </label>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="submit-btn" id="submitBtn">
                        <span class="btn-text">Estimate Price</span>
                        <span class="btn-icon">→</span>
                    </button>

                </form>
            </div>
        </main>

        <footer class="footer">
            <p>Powered by Random Forest · Trained on Indian car market data</p>
        </footer>

    </div>

    <script src="/static/script.js"></script>
</body>
</html>
